<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 360" role="img" aria-labelledby="title desc">
  <title id="title">Dark blue construction technology banner</title>
  <desc id="desc">A dark abstract banner with blue highlights, stars, stripes, and angular construction-inspired shapes.</desc>
