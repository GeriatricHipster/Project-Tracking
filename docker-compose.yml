services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: buildtrack
      POSTGRES_USER: buildtrack
      POSTGRES_PASSWORD: buildtrack
    ports:
      - "5432:5432"
    volumes:
      - buildtrack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildtrack -d buildtrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    environment:
      DATABASE_URL: postgres://buildtrack:buildtrack@db:5432/buildtrack
      JWT_SECRET: local-development-secret-change-me
      CLIENT_ORIGIN: http://localhost:5173
      PORT: 4000
      NODE_ENV: development
      APP_URL: http://localhost:5173
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run migrate && npm run seed && npm run dev"
    volumes:
      - ./server/src:/app/src

  client:
    build: ./client
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_SOCKET_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - server
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html

volumes:
  buildtrack_pgdata:
