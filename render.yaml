services:
  - type: web
    name: slack-task-notifier
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: NOTIFY_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
