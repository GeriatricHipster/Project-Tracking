services:
  - type: web
    name: buildtrack-cloud
    runtime: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buildtrack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: "*"
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: PSG and SS Tracking
      - key: MAX_BLUEPRINT_BYTES
        value: "26214400"
      - key: PGSSLMODE
        value: require

databases:
  - name: buildtrack-db
    plan: free
    databaseName: buildtrack
    user: buildtrack
